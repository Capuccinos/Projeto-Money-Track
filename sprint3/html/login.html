<!DOCTYPE html>
<html lang="pt-br">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>MoneyTrack - Entrar</title>

        <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"> <!-- ICONS -->
        <link rel="stylesheet" href="../css/estilo.css">
    </head>

    <body class="tela-login">
        
        <main class="login-container">
            <div class="logo-sistema">
                <i class="bx bx-trending-up"></i>
                <h1 class="titulo-logo">Money<span>Track</span></h1>

            </div>

            <h2 class="titulo-pagina">Entrar</h2>

            <form action="#" method="POST" class="formulario-login">

                <div class="campo">
                    <i class="bx bx-envelope"></i>
                    <input type="email" id="email" name="email" placeholder="Digite seu e-mail" required>
                </div>

                <div class="campo">
                    <i class="bx bx-lock-alt"></i>
                    <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required>
                </div>

                <button type="submit" class="botao-login">Entrar</button>

                <p class="texto-cadastro"> Não tem uma conta?<a href="cadastro.html" class="link-cadastro">Criar conta</a></p>

            </form>
            
        </main>

        <script src="../js/app.js"></script>
        <script src="../js/modo-escuro.js"></script>
</body>
</html>
