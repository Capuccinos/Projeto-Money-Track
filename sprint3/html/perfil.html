<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>MoneyTrack - Perfil</title>

    <link rel="stylesheet"
          href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css">

    <link rel="stylesheet"
          href="../css/estilo.css">

</head>

<body>

<div class="layout-sistema">

    <div class="janela-aplicativo">

        <aside class="sidebar">
            <div class="sidebar-topo">

                <a href="dashboard.html" class="logo-moneytrack">
                    <i class="bx bx-trending-up"></i>
                    Money<span>Track</span>
                </a>

                <ul class="menu-links">

                    <li>
                        <a href="dashboard.html">
                            <i class="bx bx-grid-alt"></i>
                            Dashboard
                        </a>
                    </li>

                    <li>
                        <a href="transacoes.html">
                            <i class="bx bx-transfer"></i>
                            Transações
                        </a>
                    </li>

                    <li>
                        <a href="metas.html">
                            <i class="bx bx-target-lock"></i>
                            Metas
                        </a>
                    </li>

                    <li>
                        <a href="categorias.html">
                            <i class="bx bx-folder"></i>
                            Categorias
                        </a>
                    </li>

                    <li>
                        <a href="perfil.html">
                            <i class="bx bx-user"></i>
                            Perfil
                        </a>
                    </li>

                </ul>
            </div>

            <a href="login.html" class="btn-sair-sidebar">
                <i class="bx bx-log-out"></i>
                Sair
            </a>

        </aside>

        <main class="conteudo-principal">

            <div class="dashboard-wrapper">

                <div class="topo-dashboard">

                    <h2>

                        <i class="bx bx-user"></i>

                        Meu Perfil

                    </h2>

                </div>

                <section class="caixa-branca">

                    <div class="perfil-header">

                        <div class="avatar-perfil">

                            <i class="bx bx-user"></i>

                        </div>

                        <h3 id="perfil-nome">

                            Nome do Usuário

                        </h3>

                        <p id="perfil-email">

                            usuario@exemplo.com

                        </p>

                    </div>

                    <form action="#"
                          method="POST"
                          class="form-perfil">

                        <div class="campo-perfil">

                            <label for="nome">

                                Nome

                            </label>

                            <input type="text"
                                   id="nome"
                                   name="nome"
                                   value="Nome do Usuário"
                                   placeholder="Digite seu nome"
                                   required>

                        </div>

                        <div class="campo-perfil">

                            <label for="email">

                                Email

                            </label>

                            <input type="email"
                                   id="email"
                                   name="email"
                                   value="usuario@exemplo.com"
                                   placeholder="Digite seu email"
                                   required>

                        </div>

                        <div class="campo-perfil">

                            <label for="senha">

                                Nova Senha

                            </label>

                            <input type="password"
                                   id="senha"
                                   name="senha"
                                   placeholder="Digite uma nova senha">

                        </div>

                        <div class="botoes-form">

                            <a href="dashboard.html"
                               class="btn-cancelar">

                                Cancelar

                            </a>

                            <button type="submit"
                                    class="btn-verde">

                                Salvar Alterações

                            </button>

                        </div>

                    </form>

                </section>

            </div>

        </main>

    </div>

</div>

<script src="../js/app.js"></script>
<script src="../js/modo-escuro.js"></script>
</body>
</html>
