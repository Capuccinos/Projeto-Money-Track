<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoneyTrack - Criar conta</title>
    <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"> <!-- ÍCONES  -->
    <link rel="stylesheet" href="../css/estilo.css">
</head>

<body class="tela-login">

<main class="login-container">
    <div class="logo-sistema">
        <i class="bx bx-trending-up"></i> <!-- ÍCONE DE GRÁFICO -->

        <h1>Money<span>Track</span></h1>

    </div>

    <h2>Criar conta</h2>

    <form action="#" method="POST" class="formulario-cadastro">

        <div class="campo">
            <i class="bx bx-user"></i>
            <input type="text" id="nome" name="nome" placeholder="Nome completo" required>
        </div>

        <div class="campo">
            <i class="bx bx-envelope"></i>
            <input type="email" name="email" placeholder="E-mail" required>
        </div>

        <div class="campo">
            <i class="bx bx-lock-alt"></i>
            <input type="password" name="senha" placeholder="Senha" required>
        </div>

        <button type="submit" class="botao-login">
            Criar conta
        </button>

    </form>

    <p class="texto-cadastro">
        Já tem conta?
        <a href="login.html">Entrar</a>
    </p>

</main>
<script src="../js/app.js"></script>
<script src="../js/modo-escuro.js"></script>
</body>
</html>
